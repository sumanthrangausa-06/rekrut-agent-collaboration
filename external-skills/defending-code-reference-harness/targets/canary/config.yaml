image_tag: vuln-pipeline-canary:latest
# Local-only canary — no upstream. These fields are required by the loader
# but only used for display in the find prompt.
github_url: "(local canary target — targets/canary/entry.c)"
commit: "n/a"
binary_path: /work/entry
source_root: /work
build_command: gcc -O1 -g -fsanitize=address -fno-omit-frame-pointer -o /work/entry /work/entry.c
test_command: >-
    printf 'A\003abc' > /tmp/t_a && printf 'Bhello' > /tmp/t_b &&
    printf 'C\001\002' > /tmp/t_c &&
    /work/entry /tmp/t_a && /work/entry /tmp/t_b && /work/entry /tmp/t_c

focus_areas:
  - "Alpha parser (parse_alpha) — heap allocation with input-controlled copy length"
  - "Bravo parser (parse_bravo) — fixed stack buffer, unbounded copy"
  - "Charlie parser (parse_charlie) — conditional early-free with fall-through"

# Populate once you've filed any of these upstream (you won't — it's a canary).
known_bugs: []

attack_surface: |
  Local canary. Entry point is ./entry <file> — a thin dispatch wrapper that
  picks a parser by the first byte of the input. All three parsers are
  reachable from any untrusted file.
