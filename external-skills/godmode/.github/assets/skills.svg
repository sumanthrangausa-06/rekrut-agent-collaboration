<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <style>
      /* Base reset */
      text { font-family: -apple-system, 'Segoe UI', sans-serif; }
      .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }

      /* Card fade-in */
      @keyframes cardFadeIn {
        0% { opacity: 0; transform: translateY(8px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      /* Skill text reveal */
      @keyframes skillReveal {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }

      /* Header glow pulse */
      @keyframes glowPulse {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1; }
      }

      /* Card groups */
      .card { opacity: 0; animation: cardFadeIn 0.6s ease-out forwards; }
      .card-1 { animation-delay: 0.1s; }
      .card-2 { animation-delay: 0.3s; }
      .card-3 { animation-delay: 0.5s; }
      .card-4 { animation-delay: 0.7s; }
      .card-5 { animation-delay: 0.2s; }
      .card-6 { animation-delay: 0.4s; }
      .card-7 { animation-delay: 0.6s; }
      .card-8 { animation-delay: 0.8s; }

      /* Domain headers */
      .domain-header {
        font-size: 11.5px;
        font-weight: 700;
        letter-spacing: 0.5px;
        animation: glowPulse 3s ease-in-out infinite;
      }

      /* Skill names */
      .skill-name {
        font-size: 9.2px;
        fill: #b0b0c0;
        opacity: 0;
        animation: skillReveal 0.4s ease-out forwards;
      }

      /* Stagger skill reveals per card — left column */
      .card-1 .skill-name:nth-child(1) { animation-delay: 0.9s; }
      .card-1 .skill-name:nth-child(2) { animation-delay: 1.0s; }
      .card-1 .skill-name:nth-child(3) { animation-delay: 1.1s; }
      .card-1 .skill-name:nth-child(4) { animation-delay: 1.2s; }
      .card-1 .skill-name:nth-child(5) { animation-delay: 1.3s; }

      .card-2 .skill-name:nth-child(1) { animation-delay: 1.1s; }
      .card-2 .skill-name:nth-child(2) { animation-delay: 1.2s; }
      .card-2 .skill-name:nth-child(3) { animation-delay: 1.3s; }
      .card-2 .skill-name:nth-child(4) { animation-delay: 1.4s; }
      .card-2 .skill-name:nth-child(5) { animation-delay: 1.5s; }

      .card-3 .skill-name:nth-child(1) { animation-delay: 1.3s; }
      .card-3 .skill-name:nth-child(2) { animation-delay: 1.4s; }
      .card-3 .skill-name:nth-child(3) { animation-delay: 1.5s; }
      .card-3 .skill-name:nth-child(4) { animation-delay: 1.6s; }

      .card-4 .skill-name:nth-child(1) { animation-delay: 1.5s; }
      .card-4 .skill-name:nth-child(2) { animation-delay: 1.6s; }
      .card-4 .skill-name:nth-child(3) { animation-delay: 1.7s; }
      .card-4 .skill-name:nth-child(4) { animation-delay: 1.8s; }

      /* Right column */
      .card-5 .skill-name:nth-child(1) { animation-delay: 1.0s; }
      .card-5 .skill-name:nth-child(2) { animation-delay: 1.1s; }
      .card-5 .skill-name:nth-child(3) { animation-delay: 1.2s; }
      .card-5 .skill-name:nth-child(4) { animation-delay: 1.3s; }
      .card-5 .skill-name:nth-child(5) { animation-delay: 1.4s; }

      .card-6 .skill-name:nth-child(1) { animation-delay: 1.2s; }
      .card-6 .skill-name:nth-child(2) { animation-delay: 1.3s; }
      .card-6 .skill-name:nth-child(3) { animation-delay: 1.4s; }
      .card-6 .skill-name:nth-child(4) { animation-delay: 1.5s; }

      .card-7 .skill-name:nth-child(1) { animation-delay: 1.4s; }
      .card-7 .skill-name:nth-child(2) { animation-delay: 1.5s; }
      .card-7 .skill-name:nth-child(3) { animation-delay: 1.6s; }

      .card-8 .skill-name:nth-child(1) { animation-delay: 1.6s; }
      .card-8 .skill-name:nth-child(2) { animation-delay: 1.7s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#0a0a0f" rx="6"/>

  <!-- Title area -->
  <text x="450" y="32" text-anchor="middle" fill="#e0e0e8" font-size="15" font-weight="700" font-family="sans-serif" letter-spacing="1.5" opacity="0.9">GODMODE SKILLS</text>
  <text x="450" y="48" text-anchor="middle" fill="#606078" font-size="9.5" font-family="sans-serif" letter-spacing="3">32 SKILLS ACROSS 8 DOMAINS</text>

  <!-- ==================== LEFT COLUMN ==================== -->

  <!-- Card 1: Core Workflow -->
  <g class="card card-1">
    <rect x="24" y="62" width="420" height="102" rx="5" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="24" y="62" width="3" height="102" rx="1.5" fill="#3b82f6"/>
    <text x="40" y="82" class="domain-header" fill="#3b82f6">CORE WORKFLOW</text>
    <text x="408" y="82" text-anchor="end" font-size="8.5" fill="#3b82f640" font-family="monospace">5 skills</text>
    <g class="card-1">
      <text x="40" y="100" class="skill-name mono">activation</text>
      <text x="40" y="114" class="skill-name mono">intent-discovery</text>
      <text x="40" y="128" class="skill-name mono">task-planning</text>
      <text x="40" y="142" class="skill-name mono">task-runner</text>
      <text x="40" y="156" class="skill-name mono">completion-gate</text>
    </g>
  </g>

  <!-- Card 2: Execution -->
  <g class="card card-2">
    <rect x="24" y="172" width="420" height="102" rx="5" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="24" y="172" width="3" height="102" rx="1.5" fill="#6366f1"/>
    <text x="40" y="192" class="domain-header" fill="#6366f1">EXECUTION PATTERNS</text>
    <text x="408" y="192" text-anchor="end" font-size="8.5" fill="#6366f140" font-family="monospace">5 skills</text>
    <g class="card-2">
      <text x="40" y="210" class="skill-name mono">delegated-execution</text>
      <text x="40" y="224" class="skill-name mono">parallel-execution</text>
      <text x="40" y="238" class="skill-name mono">team-orchestration</text>
      <text x="40" y="252" class="skill-name mono">agent-messaging</text>
      <text x="40" y="266" class="skill-name mono">workspace-isolation</text>
    </g>
  </g>

  <!-- Card 3: Quality -->
  <g class="card card-3">
    <rect x="24" y="282" width="420" height="90" rx="5" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="24" y="282" width="3" height="90" rx="1.5" fill="#22c55e"/>
    <text x="40" y="302" class="domain-header" fill="#22c55e">QUALITY &amp; REVIEW</text>
    <text x="408" y="302" text-anchor="end" font-size="8.5" fill="#22c55e40" font-family="monospace">4 skills</text>
    <g class="card-3">
      <text x="40" y="320" class="skill-name mono">quality-gate</text>
      <text x="40" y="334" class="skill-name mono">review-response</text>
      <text x="40" y="348" class="skill-name mono">quality-enforcement</text>
      <text x="40" y="362" class="skill-name mono">comprehension-check</text>
    </g>
  </g>

  <!-- Card 4: Research -->
  <g class="card card-4">
    <rect x="24" y="380" width="420" height="90" rx="5" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="24" y="380" width="3" height="90" rx="1.5" fill="#06b6d4"/>
    <text x="40" y="400" class="domain-header" fill="#06b6d4">RESEARCH &amp; REFERENCES</text>
    <text x="408" y="400" text-anchor="end" font-size="8.5" fill="#06b6d440" font-family="monospace">4 skills</text>
    <g class="card-4">
      <text x="40" y="418" class="skill-name mono">reference-engine</text>
      <text x="40" y="432" class="skill-name mono">github-search</text>
      <text x="40" y="446" class="skill-name mono">codebase-research</text>
      <text x="40" y="460" class="skill-name mono">design-research</text>
    </g>
  </g>

  <!-- ==================== RIGHT COLUMN ==================== -->

  <!-- Card 5: Dev Practices -->
  <g class="card card-5">
    <rect x="456" y="62" width="420" height="102" rx="5" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="456" y="62" width="3" height="102" rx="1.5" fill="#f59e0b"/>
    <text x="472" y="82" class="domain-header" fill="#f59e0b">DEV PRACTICES</text>
    <text x="840" y="82" text-anchor="end" font-size="8.5" fill="#f59e0b40" font-family="monospace">5 skills</text>
    <g class="card-5">
      <text x="472" y="100" class="skill-name mono">test-first</text>
      <text x="472" y="114" class="skill-name mono">specification-first</text>
      <text x="472" y="128" class="skill-name mono">fault-diagnosis</text>
      <text x="472" y="142" class="skill-name mono">merge-protocol</text>
      <text x="472" y="156" class="skill-name mono">pattern-matching</text>
    </g>
  </g>

  <!-- Card 6: Architecture -->
  <g class="card card-6">
    <rect x="456" y="172" width="420" height="90" rx="5" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="456" y="172" width="3" height="90" rx="1.5" fill="#8b5cf6"/>
    <text x="472" y="192" class="domain-header" fill="#8b5cf6">ARCHITECTURE &amp; DESIGN</text>
    <text x="840" y="192" text-anchor="end" font-size="8.5" fill="#8b5cf640" font-family="monospace">4 skills</text>
    <g class="card-6">
      <text x="472" y="210" class="skill-name mono">system-design</text>
      <text x="472" y="224" class="skill-name mono">ui-engineering</text>
      <text x="472" y="238" class="skill-name mono">design-integration</text>
      <text x="472" y="252" class="skill-name mono">ux-patterns</text>
    </g>
  </g>

  <!-- Card 7: Infrastructure -->
  <g class="card card-7">
    <rect x="456" y="270" width="420" height="76" rx="5" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="456" y="270" width="3" height="76" rx="1.5" fill="#f43f5e"/>
    <text x="472" y="290" class="domain-header" fill="#f43f5e">INFRASTRUCTURE &amp; OPS</text>
    <text x="840" y="290" text-anchor="end" font-size="8.5" fill="#f43f5e40" font-family="monospace">3 skills</text>
    <g class="card-7">
      <text x="472" y="308" class="skill-name mono">project-bootstrap</text>
      <text x="472" y="322" class="skill-name mono">performance-tuning</text>
      <text x="472" y="336" class="skill-name mono">security-protocol</text>
    </g>
  </g>

  <!-- Card 8: Meta -->
  <g class="card card-8">
    <rect x="456" y="354" width="420" height="62" rx="5" fill="#141420" stroke="#1e1e30" stroke-width="1"/>
    <rect x="456" y="354" width="3" height="62" rx="1.5" fill="#9ca3af"/>
    <text x="472" y="374" class="domain-header" fill="#9ca3af">META</text>
    <text x="840" y="374" text-anchor="end" font-size="8.5" fill="#9ca3af40" font-family="monospace">2 skills</text>
    <g class="card-8">
      <text x="472" y="392" class="skill-name mono">protocol-authoring</text>
      <text x="472" y="406" class="skill-name mono">knowledge-capture</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="450" y="488" text-anchor="middle" fill="#404058" font-size="8.5" font-family="monospace" letter-spacing="0.5">v1.0.0</text>
</svg>