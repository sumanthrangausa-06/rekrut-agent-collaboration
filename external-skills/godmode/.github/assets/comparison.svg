  <text x="439" y="157" fill="#b090f8" font-family="Monaco,Menlo,'Courier New',monospace" font-size="11">Activating intent-discovery...</text>
  <text x="439" y="174" fill="rgba(255,255,255,0.62)" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">&#x2022; What data sources?</text>
