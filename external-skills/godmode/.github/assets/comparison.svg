<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 520" width="830" height="520">
  <style><![CDATA[
    @keyframes pulse { 0%,100% { stroke-opacity: 0.7; } 50% { stroke-opacity: 1; } }
    .gPulse { animation: pulse 4s ease-in-out infinite; }
  ]]></style>
  <defs>
    <rect id="card" width="391" height="230" rx="8"/>
    <clipPath id="cl"><use href="#card"/></clipPath>
    <clipPath id="cr"><use href="#card"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="830" height="520" rx="12" fill="#0f0f0f"/>

  <!-- Title block -->
