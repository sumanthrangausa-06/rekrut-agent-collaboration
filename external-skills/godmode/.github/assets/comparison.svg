  <rect x="427" y="102" width="391" height="230" rx="8" fill="#1a1a1a" stroke="#00b848" stroke-width="1" class="gPulse"/>
  <circle cx="443" cy="116" r="4" fill="#ff5f56"/><circle cx="455" cy="116" r="4" fill="#ffbd2e"/><circle cx="467" cy="116" r="4" fill="#27c93f"/>
  <line x1="427" y1="126" x2="818" y2="126" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>

