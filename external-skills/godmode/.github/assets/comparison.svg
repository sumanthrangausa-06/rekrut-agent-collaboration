  <text x="22" y="352" fill="#fe1d2c" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2717;</text><text x="36" y="352" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">No requirements gathered</text>
  <text x="22" y="368" fill="#fe1d2c" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2717;</text><text x="36" y="368" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">No existing patterns checked</text>
