  <text x="415" y="48" text-anchor="middle" fill="rgba(255,255,255,0.44)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">Same prompt. Radically different engineering outcomes.</text>

  <!-- ===== LEFT COLUMN — Without GodMode ===== -->
  <!-- Header -->
  <circle cx="28" cy="72" r="9" fill="none" stroke="#fe1d2c" stroke-width="1.5"/>
  <line x1="24" y1="68" x2="32" y2="76" stroke="#fe1d2c" stroke-width="1.5"/><line x1="32" y1="68" x2="24" y2="76" stroke="#fe1d2c" stroke-width="1.5"/>
  <text x="44" y="76" fill="#fe1d2c" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" letter-spacing="1">WITHOUT GODMODE</text>
