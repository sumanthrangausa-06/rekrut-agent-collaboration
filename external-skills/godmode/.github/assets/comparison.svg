  <text x="439" y="200" fill="rgba(255,255,255,0.62)" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">&#x2022; What existing patterns?</text>
  <text x="439" y="217" fill="#00b848" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">&#x2713; Spec approved</text>
  <text x="439" y="230" fill="#00b848" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">&#x2713; 5 tasks decomposed</text>
  <text x="439" y="243" fill="#00b848" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">&#x2713; References: Found 3 repos</text>
  <text x="439" y="260" fill="rgba(255,255,255,0.3)" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">// Task 1/5: Auth middleware</text>
  <text x="439" y="273" fill="rgba(255,255,255,0.3)" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">// Based on existing codebase</text>
  <text x="439" y="288" fill="#b090f8" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">export function withAuth(handler) {</text>

  <!-- Right checklist -->
  <text x="437" y="352" fill="#00b848" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2713;</text><text x="451" y="352" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">Requirements gathered first</text>
  <text x="437" y="368" fill="#00b848" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2713;</text><text x="451" y="368" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">Existing patterns matched</text>
  <text x="437" y="384" fill="#00b848" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2713;</text><text x="451" y="384" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">TDD: tests before code</text>
  <text x="437" y="400" fill="#00b848" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2713;</text><text x="451" y="400" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">Spec-driven implementation</text>
  <text x="437" y="416" fill="#00b848" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2713;</text><text x="451" y="416" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">Secrets in env vars</text>
  <text x="437" y="432" fill="#00b848" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2713;</text><text x="451" y="432" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">Consistent naming &amp; style</text>
  <text x="437" y="448" fill="#00b848" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2713;</text><text x="451" y="448" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">Quality gates passed</text>

  <!-- Footer -->
  <text x="415" y="504" text-anchor="middle" fill="rgba(255,255,255,0.44)" font-family="'Segoe UI',system-ui,sans-serif" font-size="11">Same AI. Same prompt. The difference is the framework.</text>
