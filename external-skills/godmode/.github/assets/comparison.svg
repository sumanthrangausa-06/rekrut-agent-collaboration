  <text x="22" y="400" fill="#fe1d2c" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2717;</text><text x="36" y="400" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">No code diagnostic</text>
  <text x="22" y="416" fill="#fe1d2c" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2717;</text><text x="36" y="416" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">Hardcoded secrets in source</text>
  <text x="22" y="432" fill="#fe1d2c" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2717;</text><text x="36" y="432" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">Inconsistent with codebase</text>
  <text x="22" y="448" fill="#fe1d2c" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="600">&#x2717;</text><text x="36" y="448" fill="rgba(255,255,255,0.62)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-style="italic">"Let me know if you need changes"</text>

  <!-- ===== RIGHT COLUMN — With GodMode ===== -->
  <!-- Header -->
  <circle cx="435" cy="72" r="9" fill="none" stroke="#00b848" stroke-width="1.5"/>
  <polyline points="430,72 433,76 440,68" fill="none" stroke="#00b848" stroke-width="1.5"/>
  <text x="451" y="76" fill="#00b848" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" letter-spacing="1">WITH GODMODE</text>
  <text x="451" y="90" fill="rgba(255,255,255,0.44)" font-family="'Segoe UI',system-ui,sans-serif" font-size="12">Structured engineering pipeline</text>

