  <circle cx="28" cy="116" r="4" fill="#ff5f56"/><circle cx="40" cy="116" r="4" fill="#ffbd2e"/><circle cx="52" cy="116" r="4" fill="#27c93f"/>
  <line x1="12" y1="126" x2="403" y2="126" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>

  <!-- Left terminal text -->
  <text x="24" y="142" fill="rgba(255,255,255,0.9)" font-family="Monaco,Menlo,'Courier New',monospace" font-size="11">&gt; Build me a dashboard</text>
  <text x="24" y="157" fill="rgba(255,255,255,0.44)" font-family="Monaco,Menlo,'Courier New',monospace" font-size="11">Sure! Here's your dashboard.</text>
