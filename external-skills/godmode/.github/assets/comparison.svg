  <text x="24" y="202" fill="#fe1d2c" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">const API_KEY = "sk-1234567890"</text>
  <text x="24" y="215" fill="#fe1d2c" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">const info = await fetch("hardcoded-url")</text>
  <text x="24" y="230" fill="rgba(255,255,255,0.3)" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">// 500 lines of spaghetti...</text>
  <text x="24" y="245" fill="#fe1d2c" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">function handleEverything(x: any) {</text>
  <text x="24" y="258" fill="rgba(255,255,255,0.3)" font-family="Monaco,Menlo,'Courier New',monospace" font-size="10">  // 100 lines of spaghetti...</text>

